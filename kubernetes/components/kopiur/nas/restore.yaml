# yaml-language-server: $schema=https://cubic3d.github.io/crd-catalog/kopiur.home-operations.com/restore_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: ${app}
spec:
  mover:
    securityContext:
      runAsUser: ${kopiur_mover_uid:=2000}
      runAsGroup: ${kopiur_mover_gid:=2000}
  policy:
    onMissingSnapshot: Continue
  source:
    fromPolicy:
      name: ${app}
      offset: 0
  target:
    populator: {}
  credentialProjection:
    enabled: true

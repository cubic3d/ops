# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app bookboss
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    controllers:
      bookboss:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/szinn/bookboss
              tag: v0.8.21

            envFrom:
              - secretRef:
                  name: bookboss

            env:
              TZ: Europe/Berlin
              BOOKBOSS__DATABASE__DATABASE_URL: sqlite:///data/bookboss.db?mode=rwc
              BOOKBOSS__FRONTEND__LISTEN_PORT: &port 8080
              BOOKBOSS__FRONTEND__BASE_URL: https://bookboss.${domain}
              BOOKBOSS__LIBRARY__LIBRARY_PATH: /library/books
              BOOKBOSS__IMPORT__BOOKDROP_PATH: /library/bookdrop

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *port

            resources:
              requests:
                cpu: 10m
                memory: 128Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node.longhorn.io/create-default-disk
                    operator: In
                    values:
                      - "true"
                      - config

    service:
      app:
        ports:
          http:
            port: *port

    ingress:
      app:
        className: internal
        hosts:
          - host: bookboss.${domain}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http

    persistence:
      data:
        existingClaim: bookboss
        advancedMounts:
          bookboss:
            app:
              - path: /data
                subPath: data

      media:
        existingClaim: media
        advancedMounts:
          bookboss:
            app:
              - path: /library/books
                subPath: library/bookboss
              - path: /library/bookdrop
                subPath: downloads/bookdrop

      tmp:
        type: emptyDir

# yaml-language-server: $schema=https://cubic3d.github.io/crd-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bookboss
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  data:
    - secretKey: BOOKBOSS__ENCRYPTION_SECRET
      remoteRef:
        key: bookboss
        property: encryption_secret

    - secretKey: BOOKBOSS__METADATA__HARDCOVER_API_TOKEN
      remoteRef:
        key: bookboss
        property: hardcover_api_token

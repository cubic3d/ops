# yaml-language-server: $schema=https://cubic3d.github.io/crd-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kopiur-nas
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    template:
      data:
        KOPIA_PASSWORD: "{{ .kopiur_kopia_password }}"

        AWS_ACCESS_KEY_ID: "{{ .nas_s3_kopiur_access_key }}"
        AWS_SECRET_ACCESS_KEY: "{{ .nas_s3_kopiur_secret_key }}"

  dataFrom:
    - extract:
        key: kopiur
      rewrite:
        - regexp:
            source: (.*)
            target: kopiur_$1

    - extract:
        key: nas
      rewrite:
        - regexp:
            source: (.*)
            target: nas_$1

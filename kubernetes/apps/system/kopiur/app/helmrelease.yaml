# yaml-language-server: $schema=https://cubic3d.github.io/crd-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kopiur
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    features:
      credentialProjection:
        enabled: true
      kopiaUi:
        enabled: true

    podSecurityContext:
      runAsUser: 2000
      runAsGroup: 2000
      fsGroup: 2000

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 1Gi

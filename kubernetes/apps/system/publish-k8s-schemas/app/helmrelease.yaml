# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app publish-k8s-schemas
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    controllers:
      publish-k8s-schemas:
        type: cronjob

        cronjob:
          schedule: "0 * * * *"
          backoffLimit: 0
          concurrencyPolicy: Replace
          successfulJobsHistory: 1

        initContainers:
          generate-schemas:
            image:
              repository: ghcr.io/bjw-s-labs/k8s-crd-extractor
              tag: 2026.3.11@sha256:a26844ff81905a8fac4dba61b416bed087a1944e20e38634acba5a7f65eeac93

            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 2Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

        containers:
          app:
            image:
              repository: docker.io/alpine/git
              tag: 2.52.0

            envFrom:
              - secretRef:
                  name: publish-k8s-schemas

            env:
              HOME: /config
              GITHUB_REPOSITORY: cubic3d/crd-catalog
              GITHUB_PAGES_BRANCH: main
              GIT_AUTHOR_NAME: &author cubic3d[bot]
              GIT_AUTHOR_EMAIL: &email 4047015+cubic3d@users.noreply.github.com
              GIT_COMMITTER_NAME: *author
              GIT_COMMITTER_EMAIL: *email

            command:
              - /bin/sh
              - -ec
            args:
              - |
                repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                worktree=/tmp/pages

                rm -rf "${worktree}"

                if git clone --depth=1 --branch "${GITHUB_PAGES_BRANCH}" "${repo_url}" "${worktree}"; then
                  :
                else
                  git clone --depth=1 --no-checkout "${repo_url}" "${worktree}"
                  cd "${worktree}"
                  git checkout --orphan "${GITHUB_PAGES_BRANCH}"
                  find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf -- {} \;
                fi

                cd "${worktree}"
                find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf -- {} \;
                cp -R /data/crdSchemas/. .
                touch .nojekyll

                git add --all

                if git diff --cached --quiet; then
                  echo "No schema changes to publish"
                  exit 0
                fi

                git commit -m "job: publish latest CRD schemas ($(date -u '+%Y-%m-%dT%H:%M:%SZ'))"
                git push origin "${GITHUB_PAGES_BRANCH}"

            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 128Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    defaultPodOptions:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch

    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          publish-k8s-schemas:
            generate-schemas:
              - path: /config/.datree
                subPath: data
              - path: /tmp
                subPath: tmp

            app:
              - path: /data
                subPath: data
              - path: /tmp
                subPath: tmp

    serviceAccount:
      publish-k8s-schemas: {}

    rbac:
      roles:
        publish-k8s-schemas:
          type: ClusterRole
          rules:
            - apiGroups:
                - apiextensions.k8s.io
              resources:
                - customresourcedefinitions
                - customresourcedefinitions/status
              verbs:
                - get
                - list
                - watch
            - apiGroups:
                - apiregistration.k8s.io
              resources:
                - apiservices
                - apiservices/status
              verbs:
                - get
                - list
                - watch

      bindings:
        publish-k8s-schemas:
          type: ClusterRoleBinding
          roleRef:
            identifier: publish-k8s-schemas
          subjects:
            - identifier: publish-k8s-schemas

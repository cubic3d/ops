# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app publish-k8s-schemas
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    controllers:
      publish-k8s-schemas:
        type: cronjob

        cronjob:
          schedule: "0 * * * *"
          backoffLimit: 0
          concurrencyPolicy: Replace
          successfulJobsHistory: 1

        initContainers:
          generate-schemas:
            image:
              repository: ghcr.io/bjw-s-labs/k8s-crd-extractor
              tag: 2026.3.11@sha256:a26844ff81905a8fac4dba61b416bed087a1944e20e38634acba5a7f65eeac93

            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 2Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

        containers:
          app:
            image:
              repository: docker.io/alpine/git
              tag: 2.52.0

            envFrom:
              - secretRef:
                  name: publish-k8s-schemas

            env:
              GIT_REPO: github.com/cubic3d/crd-catalog.git
              GIT_AUTHOR_NAME: &author cubic3d[bot]
              GIT_AUTHOR_EMAIL: &email 4047015+cubic3d@users.noreply.github.com
              GIT_COMMITTER_NAME: *author
              GIT_COMMITTER_EMAIL: *email

            command:
              - /bin/sh
              - -c
            args:
              - |
                set -eu
                export HOME=/tmp

                git clone --depth=1 \
                  "https://x-access-token:$GITHUB_TOKEN@$GIT_REPO" \
                  /tmp/repo

                mkdir -p /tmp/repo
                cp -r /data/crdSchemas/. /tmp/repo/
                cd /tmp/repo
                touch .nojekyll
                git add .

                if git diff --cached --quiet; then
                  echo "No changes to commit"
                  exit 0
                fi

                git commit -m "job: publish latest CRD schemas ($(date -u '+%Y-%m-%dT%H:%M:%SZ'))"
                git push

            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 128Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    defaultPodOptions:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch

    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          publish-k8s-schemas:
            generate-schemas:
              - path: /config/.datree
                subPath: data
              - path: /tmp
                subPath: tmp

            app:
              - path: /data
                subPath: data
              - path: /tmp
                subPath: tmp

    serviceAccount:
      publish-k8s-schemas: {}

    rbac:
      roles:
        publish-k8s-schemas:
          type: ClusterRole
          rules:
            - apiGroups:
                - apiextensions.k8s.io
              resources:
                - customresourcedefinitions
                - customresourcedefinitions/status
              verbs:
                - get
                - list
                - watch
            - apiGroups:
                - apiregistration.k8s.io
              resources:
                - apiservices
                - apiservices/status
              verbs:
                - get
                - list
                - watch

      bindings:
        publish-k8s-schemas:
          type: ClusterRoleBinding
          roleRef:
            identifier: publish-k8s-schemas
          subjects:
            - identifier: publish-k8s-schemas

# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kopia
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    controllers:
      kopia-nas:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/home-operations/kopia
              tag: 0.23.0@sha256:76865b421548b1d7bb26a8268f0f0bc828be4eec3f8d8b9c8ece991c99878f94

            args:
              - --without-password

            env:
              TZ: Europe/Berlin
              KOPIA_WEB_ENABLED: true
              KOPIA_WEB_PORT: &port 8080
              KOPIA_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: kopia
                    key: repo_key

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  failureThreshold: 10
              readiness: *probes

            resources:
              requests:
                cpu: 15m
                memory: 50Mi
              limits:
                memory: 500Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

      kopia-cloud:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/home-operations/kopia
              tag: 0.23.0@sha256:76865b421548b1d7bb26a8268f0f0bc828be4eec3f8d8b9c8ece991c99878f94

            args:
              - --without-password

            env:
              TZ: Europe/Berlin
              KOPIA_WEB_ENABLED: true
              KOPIA_WEB_PORT: *port
              KOPIA_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: kopia
                    key: repo_key

            probes:
              liveness: *probes
              readiness: *probes

            resources:
              requests:
                cpu: 15m
                memory: 50Mi
              limits:
                memory: 500Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch

    service:
      nas:
        controller: kopia-nas
        ports:
          http:
            port: *port
      cloud:
        controller: kopia-cloud
        ports:
          http:
            port: *port

    route:
      nas:
        hostnames:
          - kopia-nas.${domain}
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: nas
                port: http

      cloud:
        hostnames:
          - kopia-cloud.${domain}
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: cloud
                port: http

    rawResources:
      kopia-nas:
        manifest:
          apiVersion: gateway.envoyproxy.io/v1alpha1
          kind: SecurityPolicy
          spec:
            targetRefs:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
                name: kopia-nas

            extAuth: &extAuth
              failOpen: false

              headersToExtAuth:
                - accept
                - cookie
                - authorization
                - proxy-authorization
                - x-forwarded-proto

              http:
                backendRefs:
                  - name: authelia
                    namespace: auth
                    port: 80

                path: /api/authz/ext-authz/

                headersToBackend:
                  - Remote-User
                  - Remote-Groups
                  - Remote-Name
                  - Remote-Email

      kopia-cloud:
        manifest:
          apiVersion: gateway.envoyproxy.io/v1alpha1
          kind: SecurityPolicy
          spec:
            targetRefs:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
                name: kopia-cloud

            extAuth: *extAuth

    persistence:
      config-file:
        type: secret
        name: kopia
        advancedMounts:
          kopia-nas:
            app:
              - path: /config/repository.config
                subPath: repository.config.nas
                readOnly: true
          kopia-cloud:
            app:
              - path: /config/repository.config
                subPath: repository.config.cloud
                readOnly: true

      tmp:
        type: emptyDir
        advancedMounts:
          kopia-nas:
            app:
              - path: /config
                subPath: config/nas
              - path: /tmp
                subPath: tmp/nas
          kopia-cloud:
            app:
              - path: /config
                subPath: config/cloud
              - path: /tmp
                subPath: tmp/cloud

# yaml-language-server: $schema=https://cubic3d.github.io/crd-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: onepassword-connect-credentials
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  data:
    - secretKey: 1password-credentials.json
      remoteRef:
        key: 1password
        property: 1password-credentials.json
---
# yaml-language-server: $schema=https://cubic3d.github.io/crd-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: onepassword-connect-token
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  data:
    - secretKey: token
      remoteRef:
        key: 1password
        property: token

# yaml-language-server: $schema=https://cubic3d.github.io/crd-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app external-secrets
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    image:
      repository: ghcr.io/external-secrets/external-secrets
    installCRDs: true

    certController:
      image:
        repository: ghcr.io/external-secrets/external-secrets

    webhook:
      image:
        repository: ghcr.io/external-secrets/external-secrets

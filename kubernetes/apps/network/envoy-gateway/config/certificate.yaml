# yaml-language-server: $schema=https://cubic3d.github.io/crd-catalog/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: main-domain
spec:
  secretName: main-domain-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - ${domain}
    - "*.${domain}"

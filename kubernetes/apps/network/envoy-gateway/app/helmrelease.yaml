# yaml-language-server: $schema=https://cubic3d.github.io/crd-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ingress-nginx-internal
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    config:
      envoyGateway:
        extensionApis:
          enableBackend: true
        provider:
          type: Kubernetes
          kubernetes:
            deploy:
              type: GatewayNamespace

# yaml-language-server: $schema=https://cubic3d.github.io/crd-catalog/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: cloudflared-tunnel
spec:
  endpoints:
    - dnsName: ingress-ext.${domain}
      recordType: CNAME
      targets: ["${cloudflare_tunnel_id}.cfargotunnel.com"]

# yaml-language-server: $schema=https://cubic3d.github.io/crd-catalog/k8s.cni.cncf.io/networkattachmentdefinition_v1.json
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: multus-iot
spec:
  config: |-
    {
      "cniVersion": "1.1.0",
      "name": "multus-iot",
      "plugins": [
        {
          "type": "macvlan",
          "master": "bond0.10",
          "mode": "bridge",
          "ipam": {
            "type": "static",
            "routes": [
              { "dst": "0.0.0.0/0", "gw": "192.168.10.1" },
              { "dst": "::/0", "gw": "fe80::1" }
            ]
          }
        },
        {
          "type": "sbr"
        }
      ]
    }

# yaml-language-server: $schema=https://cubic3d.github.io/crd-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: silverbullet
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  data:
    - secretKey: SB_AUTH_TOKEN
      remoteRef:
        key: silverbullet
        property: api_key

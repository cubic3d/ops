# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mealie
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    controllers:
      mealie:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.16.0

            envFrom:
              - secretRef:
                  name: mealie

            env:
              TZ: Europe/Berlin
              BASE_URL: https://mealie.${domain}
              ALLOW_PASSWORD_LOGIN: "false"
              SMTP_FROM_EMAIL: noreply@${domain}
              OIDC_AUTH_ENABLED: "true"
              OIDC_CONFIGURATION_URL: https://auth.${domain}/.well-known/openid-configuration
              OIDC_CLIENT_ID: mealie
              OIDC_ADMIN_GROUP: admins
              OIDC_PROVIDER_NAME: Yachthafen ID
              OPENAI_BASE_URL: https://openrouter.ai/api/v1
              OPENAI_MODEL: qwen/qwen3.5-flash-02-23

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/app/about
                    port: &port 9000
              readiness: *probes
              startup: *probes

            resources:
              requests:
                cpu: 50m
                memory: 250Mi
              limits:
                memory: 500Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node.longhorn.io/create-default-disk
                    operator: In
                    values:
                      - "true"
                      - config

    service:
      app:
        ports:
          http:
            port: *port

    ingress:
      app:
        className: internal
        hosts:
          - host: mealie.${domain}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http

    persistence:
      data:
        existingClaim: mealie
        globalMounts:
          - path: /app/data

      tmp:
        type: emptyDir

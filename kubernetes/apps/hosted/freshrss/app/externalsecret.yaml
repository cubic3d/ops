# yaml-language-server: $schema=https://cubic3d.github.io/crd-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: freshrss
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    template:
      data:
        OIDC_CLIENT_SECRET: "{{ .a_oidc_secret_freshrss_plain }}"
        OIDC_CLIENT_CRYPTO_KEY: "{{ .f_crypto_key }}"
  dataFrom:
    - extract:
        key: freshrss
      rewrite:
        - regexp:
            source: (.*)
            target: f_$1

    - extract:
        key: authelia
      rewrite:
        - regexp:
            source: (.*)
            target: a_$1

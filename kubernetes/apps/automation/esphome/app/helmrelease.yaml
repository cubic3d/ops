# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app esphome
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    controllers:
      esphome:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [{
                "name":"multus-iot",
                "namespace": "network",
                "ips": ["192.168.10.60/24"],
                "mac": "72:a0:5d:93:7f:8d"
              }]

        containers:
          app:
            image:
              repository: ghcr.io/home-operations/esphome
              tag: 2026.6.4

            env:
              TZ: Europe/Berlin

            resources:
              requests:
                cpu: 10m
                memory: 400Mi
              limits:
                memory: 3Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

      code-server:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.127.0

            args:
              - --auth
              - none
              - --disable-telemetry
              - --disable-update-check
              - --user-data-dir
              - /config/.vscode
              - --extensions-dir
              - /config/.vscode
              - --port
              - "12321"
              - /config

            env:
              TZ: Europe/Berlin

            resources:
              requests:
                cpu: 10m
                memory: 10Mi
              limits:
                memory: 2Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node.longhorn.io/create-default-disk
                    operator: In
                    values:
                      - "true"
                      - config

    service:
      esphome:
        controller: esphome
        ports:
          http:
            port: 6052

      code-server:
        controller: code-server
        ports:
          http:
            port: 12321

    route:
      app:
        hostnames:
          - esp.${domain}
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: esphome
                port: http

      code-server:
        hostnames:
          - esp-code.${domain}
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: code-server
                port: http

    rawResources:
      authz-app:
        manifest:
          apiVersion: gateway.envoyproxy.io/v1alpha1
          kind: SecurityPolicy
          spec:
            targetRefs:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
                name: esphome-app

            extAuth: &extAuth
              failOpen: false

              headersToExtAuth:
                - accept
                - cookie
                - authorization
                - proxy-authorization
                - x-forwarded-proto

              http:
                backendRefs:
                  - name: authelia
                    namespace: auth
                    port: 80

                path: /api/authz/ext-authz/

                headersToBackend:
                  - Remote-User
                  - Remote-Groups
                  - Remote-Name
                  - Remote-Email

      authz-code-server:
        manifest:
          apiVersion: gateway.envoyproxy.io/v1alpha1
          kind: SecurityPolicy
          spec:
            targetRefs:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
                name: esphome-code-server

            extAuth: *extAuth

    persistence:
      config:
        existingClaim: esphome

      cache:
        type: emptyDir
        advancedMounts:
          esphome:
            app:
              - path: /cache

      secrets:
        type: secret
        name: esphome
        globalMounts:
          - path: /config/secrets.yaml
            subPath: secrets.yaml

      tmp:
        type: emptyDir

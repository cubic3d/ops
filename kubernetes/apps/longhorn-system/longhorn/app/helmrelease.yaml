# yaml-language-server: $schema=https://cubic3d.github.io/crd-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app longhorn
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    persistence:
      defaultClassReplicaCount: 2
      defaultDataLocality: best-effort
      migratable: true

    csi:
      attacherReplicaCount: 2
      provisionerReplicaCount: 2
      resizerReplicaCount: 2
      snapshotterReplicaCount: 2

    defaultSettings:
      createDefaultDiskLabeledNodes: true
      defaultDataLocality: best-effort
      replicaAutoBalance: best-effort
      storageMinimalAvailablePercentage: "1"
      storageReservedPercentageForDefaultDisk: "10"
      defaultReplicaCount: "2"
      defaultLonghornStaticStorageClass: longhorn
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      concurrentAutomaticEngineUpgradePerNodeLimit: "3"
      orphanResourceAutoDeletion: replica-data;instance
      removeSnapshotsDuringFilesystemTrim: true
      allowCollectingLonghornUsageMetrics: false
      taintToleration: dedicated=gameserver:NoSchedule

    longhornManager:
      tolerations:
        - key: dedicated
          operator: Equal
          value: gameserver
          effect: NoSchedule

    longhornUI:
      replicas: 1

    httproute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: network
      hostnames:
        - longhorn.${domain}

# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main
    paths:
      - kubernetes/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter-changes:
    name: Filter changes
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get changed files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |-
            kubernetes/**/*

  flate:
    if: needs.filter-changes.outputs.changed-files != '[]'
    name: Flate
    runs-on: ubuntu-latest
    needs:
      - filter-changes
    env:
      FLATE_PATH: kubernetes/flux/cluster
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          MISE_OVERRIDE_CONFIG_FILENAMES: .ignore-config-from-repo.toml
        with:
          cache: false
          tool_versions: |
            github:home-operations/flate latest

      - name: Run test
        run: flate test all --base ${{ github.event.repository.default_branch }}

      - name: Run diff
        id: diff
        run: |-
          diff=$(flate diff all --output github)
          echo "Changes:"
          echo "${diff}"
          {
            echo 'diff<<EOF'
            echo "${diff}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        if: steps.diff.outputs.diff != ''
        id: app-token
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - name: Add Comment
        if: steps.diff.outputs.diff != ''
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          header: ${{ github.event.pull_request.number }}/kubernetes
          message: |
            ```diff
            ${{ steps.diff.outputs.diff }}
            ```
